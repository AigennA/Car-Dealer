name: Claude Code

# Mention @claude in an issue, a PR comment, or a review to have Claude
# respond, answer questions, fix CI, or modify code. Powered by the
# Claude Code GitHub App (anthropics/claude-code-action).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Only run when "@claude" is actually mentioned
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # ── Auth: pick ONE of the two below ─────────────────────────────
          # Option A — Anthropic API key (pay-as-you-go).
          #   Add a repo secret named ANTHROPIC_API_KEY (console.anthropic.com).
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          #
          # Option B — Claude subscription (Pro/Max). Comment out the line
          #   above and instead add a CLAUDE_CODE_OAUTH_TOKEN secret
          #   (generate it locally with:  claude setup-token), then use:
          # claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
